<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B'Creamy — Onboarding Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0a0a0a; --black-2:#141010; --card:#161212;
    --red:#DA2B2B; --red-dark:#B31F1F; --gold:#F5C518;
    --white:#ffffff; --text-soft:#9c9088; --text-dim:#6b625c; --line:#2a2222;
    --mint:#2FBF71; --amber:#E8A93A; --danger:#DA2B2B;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--black);color:var(--white);font-family:'Inter',sans-serif;}
  h1,h2,h3{font-family:'Poppins',sans-serif;font-weight:700;margin:0;}

  .login-wrap{max-width:340px;margin:16vh auto;text-align:center;padding:0 20px;}
  .logo-icon{width:52px;height:52px;border-radius:12px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid var(--gold);margin:0 auto 14px;}
  .login-wrap h1{font-size:22px;}
  .login-wrap .sub{color:var(--text-soft);font-size:13px;margin-top:6px;}
  .login-wrap input{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:9px;font-size:16px;text-align:center;margin:16px 0;background:var(--card);color:#fff;}
  .login-wrap input:focus{outline:none;border-color:var(--red);}

  .navbar{background:var(--black);border-bottom:3px solid var(--red);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
  .navbar .logo-row{display:flex;align-items:center;gap:12px;}
  .navbar .logo-icon{width:38px;height:38px;font-size:18px;margin:0;border-radius:9px;}
  .wordmark{font-family:'Poppins',sans-serif;font-weight:800;font-size:18px;letter-spacing:.02em;}
  .wordmark .b{color:var(--gold);} .wordmark .creamy{color:var(--red);}
  .tagline{color:var(--text-dim);font-size:11px;}
  .nav-right{display:flex;align-items:center;gap:12px;}
  .live-pill{display:flex;align-items:center;gap:6px;color:var(--mint);font-size:12px;font-weight:700;background:#0d2318;padding:6px 12px;border-radius:20px;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--mint);}
  .btn-logout{background:none;border:1.5px solid var(--red);color:var(--red);border-radius:20px;padding:7px 16px;font-size:12.5px;font-weight:700;}

  .tabs-row{background:var(--black);display:flex;gap:24px;padding:0 24px;border-bottom:1px solid var(--line);}
  .tab{padding:13px 2px;font-size:12.5px;font-weight:700;letter-spacing:.04em;color:var(--text-soft);cursor:pointer;border-bottom:3px solid transparent;text-transform:uppercase;}
  .tab.active{color:var(--gold);border-color:var(--gold);}

  .wrap{max-width:1120px;margin:0 auto;padding:24px 20px 80px;}

  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
  @media (max-width:800px){.stats-row{grid-template-columns:repeat(2,1fr);}}
  .stat-card{background:var(--card);border-radius:var(--radius);padding:16px 18px;border-top:3px solid var(--line);}
  .stat-card .lbl{color:var(--text-soft);font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;}
  .stat-card .num{font-family:'Poppins',sans-serif;font-size:30px;font-weight:800;margin-top:6px;}
  .stat-card .sub{color:var(--text-dim);font-size:11.5px;margin-top:2px;}
  .stat-card.red{border-top-color:var(--red);} .stat-card.gold{border-top-color:var(--gold);}
  .stat-card.mint{border-top-color:var(--mint);} .stat-card.amber{border-top-color:var(--amber);}

  .card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;border:1px solid var(--line);}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;padding:10px 12px;color:var(--text-soft);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--line);}
  td{padding:11px 12px;border-bottom:1px solid var(--line);color:#e6e0da;}
  tr:hover td{background:#1c1616;}

  .badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
  .badge.draft{background:#3a2c0d;color:var(--amber);}
  .badge.submitted{background:#0d2318;color:var(--mint);}

  .switch{position:relative;display:inline-block;width:38px;height:21px;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;cursor:pointer;inset:0;background:var(--line);border-radius:20px;transition:.2s;}
  .slider::before{content:'';position:absolute;height:16px;width:16px;left:2.5px;bottom:2.5px;background:#fff;border-radius:50%;transition:.2s;}
  .switch input:checked + .slider{background:var(--red);}
  .switch input:checked + .slider::before{transform:translateX(16px);}

  .btn{padding:9px 16px;border-radius:8px;border:none;font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit;}
  .btn-primary{background:var(--red);color:#fff;}
  .btn-primary:hover{background:var(--red-dark);}
  .btn-gold{background:var(--gold);color:#1c1410;}
  .btn-ghost{background:none;border:1.5px solid var(--line);color:#e6e0da;}
  .btn-ghost:hover{border-color:var(--red);}
  .btn-danger{background:none;border:1.5px solid var(--danger);color:var(--danger);}
  .row-actions{display:flex;gap:6px;}

  .field-form{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  .field-form label{display:block;font-size:11.5px;color:var(--text-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em;font-weight:700;}
  .field-form input, .field-form select{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:13.5px;font-family:inherit;background:#1c1616;color:#fff;}
  .field-form input:focus, .field-form select:focus{outline:none;border-color:var(--red);}
  .field-form .full{grid-column:1/-1;}
  .checkbox-row{display:flex;gap:8px;align-items:center;color:#e6e0da;font-size:13.5px;}

  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:14px;max-width:640px;width:100%;max-height:85vh;overflow:auto;padding:24px;}
  .modal h3{margin-bottom:14px;color:#fff;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px 16px;font-size:13.5px;margin-bottom:16px;}
  .detail-grid .k{color:var(--text-soft);}
  .doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:16px;}
  .doc-item{background:#1c1616;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .doc-thumb{width:100%;height:80px;display:flex;align-items:center;justify-content:center;background:#0f0c0c;color:var(--text-dim);font-size:26px;overflow:hidden;}
  .doc-thumb img{width:100%;height:100%;object-fit:cover;}
  .doc-name{font-size:11px;padding:6px 8px 2px;color:#e6e0da;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .doc-actions{display:flex;gap:4px;padding:0 8px 8px;}
  .doc-actions a, .doc-actions button{flex:1;font-size:10.5px;text-align:center;padding:5px 4px;border-radius:6px;text-decoration:none;cursor:pointer;font-family:inherit;font-weight:700;border:none;}
  .doc-view{background:var(--line);color:#fff;}
  .doc-dl{background:var(--gold);color:#1c1410;}
  .doc-del{background:none;border:1px solid var(--danger);color:var(--danger);}
  .danger-zone{border-top:1px solid var(--line);margin-top:18px;padding-top:16px;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--red);color:#fff;padding:11px 20px;border-radius:20px;font-size:13.5px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;}
  .toast.show{opacity:1;}
  .empty{color:var(--text-dim);font-size:13.5px;padding:24px;text-align:center;}
</style>
</head>
<body>

<div id="loginScreen" class="login-wrap">
  <div class="logo-icon">🍦</div>
  <h1>B'Creamy Admin</h1>
  <p class="sub">Enter the admin PIN to continue.</p>
  <input type="password" id="pinInput" placeholder="PIN">
  <button class="btn btn-primary" style="width:100%;padding:12px;" onclick="doLogin()">Enter</button>
  <div id="loginError" style="color:var(--danger);font-size:13px;margin-top:8px;"></div>
</div>

<div id="mainScreen" style="display:none">
  <div class="navbar">
    <div class="logo-row">
      <div class="logo-icon">🍦</div>
      <div>
        <div class="wordmark"><span class="b">B'</span><span class="creamy">CREAMY</span></div>
        <div class="tagline">Onboarding Admin</div>
      </div>
    </div>
    <div class="nav-right">
      <div class="live-pill"><span class="live-dot"></span>LIVE</div>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </div>
  <div class="tabs-row">
    <div class="tab active" id="tabFields" onclick="switchTab('fields')">Field Builder</div>
    <div class="tab" id="tabApplicants" onclick="switchTab('applicants')">Applicants</div>
  </div>

  <div class="wrap">
    <div id="viewFields"></div>
    <div id="viewApplicants" style="display:none"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="modalRoot"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzOyCChy-cmc7qPyJ6aLLTJRbMNGtEL0n7wVGdhqa71Tlpcapn2Zz51uix9eauj93v4/exec';
let adminPin = sessionStorage.getItem('bcreamy_admin_pin') || '';
let fieldsCache = [];
let employeesCache = [];

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

async function apiGet(params){
  try {
    const res = await fetch(API_URL + '?' + new URLSearchParams(params));
    return await res.json();
  } catch (err) {
    console.error('apiGet failed:', params, err);
    toast('Network error — check your connection and try again.');
    return { ok:false, error: 'Network error: ' + err.message };
  }
}
async function apiPost(action, data){
  try {
    const res = await fetch(API_URL, {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:'data='+encodeURIComponent(JSON.stringify({action,...data}))});
    return await res.json();
  } catch (err) {
    console.error('apiPost failed:', action, err);
    toast('Network error — check your connection and try again.');
    return { ok:false, error: 'Network error: ' + err.message };
  }
}

async function doLogin(){
  const pin = document.getElementById('pinInput').value;
  const res = await apiGet({action:'adminLogin', pin});
  if(res.ok && res.valid){
    adminPin = pin; sessionStorage.setItem('bcreamy_admin_pin', pin);
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainScreen').style.display='block';
    loadFields();
  } else {
    document.getElementById('loginError').textContent = 'Incorrect PIN.';
  }
}
function logout(){ sessionStorage.removeItem('bcreamy_admin_pin'); location.reload(); }
if(adminPin){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainScreen').style.display='block';
  loadFields();
}

function switchTab(tab){
  document.getElementById('tabFields').classList.toggle('active', tab==='fields');
  document.getElementById('tabApplicants').classList.toggle('active', tab==='applicants');
  document.getElementById('viewFields').style.display = tab==='fields' ? 'block' : 'none';
  document.getElementById('viewApplicants').style.display = tab==='applicants' ? 'block' : 'none';
  if(tab==='applicants') loadApplicants();
}

// ============ FIELD BUILDER ============
async function loadFields(){
  const res = await apiGet({action:'adminGetFieldConfig'});
  if(!res.ok){ toast('Failed to load fields'); return; }
  fieldsCache = res.fields;
  renderFieldBuilder();
}

function renderFieldBuilder(){
  const active = fieldsCache.filter(f=>f.is_active).length;
  const mandatory = fieldsCache.filter(f=>f.is_mandatory).length;
  const steps = new Set(fieldsCache.map(f=>f.step_number)).size;
  const el = document.getElementById('viewFields');
  el.innerHTML = `
    <div class="stats-row">
      <div class="stat-card red"><div class="lbl">Total Fields</div><div class="num">${fieldsCache.length}</div><div class="sub">Across the form</div></div>
      <div class="stat-card gold"><div class="lbl">Active</div><div class="num">${active}</div><div class="sub">Visible to employees</div></div>
      <div class="stat-card mint"><div class="lbl">Mandatory</div><div class="num">${mandatory}</div><div class="sub">Block submission if empty</div></div>
      <div class="stat-card amber"><div class="lbl">Steps</div><div class="num">${steps}</div><div class="sub">Wizard sections</div></div>
    </div>
    <div class="card">
      <div class="toolbar">
        <h2 style="font-size:16px">Form Fields</h2>
        <button class="btn btn-primary" onclick="openFieldModal()">+ Add Field</button>
      </div>
      <table>
        <thead><tr><th>Step</th><th>Section</th><th>Label</th><th>Type</th><th>Mandatory</th><th>Active</th><th></th></tr></thead>
        <tbody>
          ${fieldsCache.map(f=>`
            <tr>
              <td>${f.step_number}</td>
              <td>${f.form_section}</td>
              <td>${f.field_label}</td>
              <td style="color:var(--text-soft)">${f.field_type}</td>
              <td><label class="switch"><input type="checkbox" ${f.is_mandatory?'checked':''} onchange="toggleField('${f.field_id}','mandatory',this.checked)"><span class="slider"></span></label></td>
              <td><label class="switch"><input type="checkbox" ${f.is_active?'checked':''} onchange="toggleField('${f.field_id}','active',this.checked)"><span class="slider"></span></label></td>
              <td class="row-actions">
                <button class="btn btn-ghost" onclick='openFieldModal(${JSON.stringify(f).replace(/'/g,"&apos;")})'>Edit</button>
                <button class="btn btn-danger" onclick="deleteField('${f.field_id}')">Delete</button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

async function toggleField(fieldId, toggle, value){
  await apiPost('adminToggleField', {field_id: fieldId, toggle, value});
  toast('Updated');
  loadFields();
}
async function deleteField(fieldId){
  if(!confirm('Delete this field permanently? Existing submitted data for it is kept but will no longer show on the form.')) return;
  await apiPost('adminDeleteField', {field_id: fieldId});
  toast('Field deleted');
  loadFields();
}

const FIELD_TYPES = ['text','number','date','dropdown','checkbox','file','address','grid','nomination','signature'];

function openFieldModal(field){
  const f = field || {field_id:'', field_label:'', field_type:'text', form_section:'', step_number:1, is_mandatory:false, is_active:true, sort_order:999, options:[]};
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <h3>${field ? 'Edit Field' : 'Add New Field'}</h3>
        <div class="field-form">
          <div><label>Label</label><input id="mf_label" value="${(f.field_label||'').replace(/"/g,'&quot;')}"></div>
          <div><label>Type</label>
            <select id="mf_type">${FIELD_TYPES.map(t=>`<option value="${t}" ${f.field_type===t?'selected':''}>${t}</option>`).join('')}</select>
          </div>
          <div><label>Form Section</label><input id="mf_section" value="${(f.form_section||'').replace(/"/g,'&quot;')}"></div>
          <div><label>Step Number (1-5)</label><input id="mf_step" type="number" min="1" max="5" value="${f.step_number}"></div>
          <div><label>Sort Order</label><input id="mf_sort" type="number" value="${f.sort_order}"></div>
          <div><label>Dropdown Options (pipe-separated)</label><input id="mf_options" value="${(f.options||[]).join('|')}"></div>
          <div class="full"><label class="checkbox-row"><input type="checkbox" id="mf_mandatory" ${f.is_mandatory?'checked':''}> Mandatory</label></div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:8px;">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick='saveField(${JSON.stringify(f.field_id)})'>Save</button>
        </div>
      </div>
    </div>`;
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

async function saveField(fieldId){
  const field = {
    field_id: fieldId || '',
    field_label: document.getElementById('mf_label').value,
    field_type: document.getElementById('mf_type').value,
    form_section: document.getElementById('mf_section').value,
    step_number: Number(document.getElementById('mf_step').value)||1,
    sort_order: Number(document.getElementById('mf_sort').value)||999,
    is_mandatory: document.getElementById('mf_mandatory').checked,
    is_active: true,
    options: document.getElementById('mf_options').value.split('|').map(s=>s.trim()).filter(Boolean)
  };
  const res = await apiPost('adminSaveField', {field});
  if(res.ok){ toast('Saved'); closeModal(); loadFields(); } else toast('Error: '+res.error);
}

// ============ APPLICANTS ============
async function loadApplicants(){
  const res = await apiGet({action:'adminListEmployees'});
  if(!res.ok){ toast('Failed to load applicants'); return; }
  employeesCache = res.employees;
  renderApplicants();
}
function renderApplicants(){
  const el = document.getElementById('viewApplicants');
  const total = employeesCache.length;
  const draft = employeesCache.filter(e=>e.status==='draft').length;
  const submitted = employeesCache.filter(e=>e.status==='submitted').length;
  const avgProgress = total ? Math.round(employeesCache.reduce((s,e)=>s+Number(e.progress_pct||0),0)/total) : 0;

  const statsHtml = `
    <div class="stats-row">
      <div class="stat-card red"><div class="lbl">Total Applicants</div><div class="num">${total}</div><div class="sub">All time</div></div>
      <div class="stat-card amber"><div class="lbl">In Draft</div><div class="num">${draft}</div><div class="sub">Not yet submitted</div></div>
      <div class="stat-card mint"><div class="lbl">Submitted</div><div class="num">${submitted}</div><div class="sub">Ready for review</div></div>
      <div class="stat-card gold"><div class="lbl">Avg Progress</div><div class="num">${avgProgress}%</div><div class="sub">Across all drafts</div></div>
    </div>`;

  if(total===0){ el.innerHTML = statsHtml + `<div class="card"><div class="empty">No applicants yet.</div></div>`; return; }

  el.innerHTML = statsHtml + `
    <div class="card">
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Mobile</th><th>Status</th><th>Progress</th><th></th></tr></thead>
        <tbody>
          ${employeesCache.map(e=>`
            <tr>
              <td>${e.full_name||'—'}</td>
              <td style="color:var(--text-soft)">${e.email||'—'}</td>
              <td style="color:var(--text-soft)">${e.mobile||'—'}</td>
              <td><span class="badge ${e.status}">${e.status}</span></td>
              <td>${e.progress_pct}%</td>
              <td><button class="btn btn-ghost" onclick="openApplicant('${e.employee_id}')">View</button></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function isImageMime(mime){ return (mime||'').startsWith('image/'); }

function docThumb(d){
  if(isImageMime(d.mime_type)){
    return `<img src="https://drive.google.com/thumbnail?id=${d.drive_file_id}&sz=w300" alt="${d.file_name}" loading="lazy">`;
  }
  return (d.mime_type||'').includes('pdf') ? '📄' : '📎';
}

async function openApplicant(employeeId){
  const res = await apiGet({action:'adminGetEmployee', employee_id: employeeId});
  if(!res.ok){ toast('Failed to load applicant'); return; }
  const emp = res.employee;
  const docs = emp.documents || [];
  const dataRows = Object.entries(emp.data||{}).filter(([k,v])=>typeof v!=='object').map(([k,v])=>`<div class="k">${k}</div><div>${v}</div>`).join('');
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <h3>${emp.full_name || emp.employee_id}</h3>
        <p style="font-size:12.5px;color:var(--text-soft)">Status: <span class="badge ${emp.status}">${emp.status}</span> · Progress: ${emp.progress_pct}%</p>
        <div class="detail-grid">${dataRows}</div>
        <h3 style="font-size:14px;margin-bottom:8px;">Documents</h3>
        ${docs.length ? `<div class="doc-grid">
          ${docs.map(d=>`
            <div class="doc-item">
              <div class="doc-thumb">${docThumb(d)}</div>
              <div class="doc-name" title="${d.file_name}">${d.file_name}</div>
              <div class="doc-actions">
                <a class="doc-view" href="${d.drive_url}" target="_blank">View</a>
                <a class="doc-dl" href="https://drive.google.com/uc?export=download&id=${d.drive_file_id}" target="_blank">↓</a>
                <button class="doc-del" onclick="deleteDocument('${d.doc_id}','${emp.employee_id}')">✕</button>
              </div>
            </div>`).join('')}
        </div>` : '<div class="empty">No documents uploaded yet.</div>'}
        <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="downloadZip('${emp.employee_id}')">Download All Docs (ZIP)</button>
          <button class="btn btn-gold" onclick="generatePdf('${emp.employee_id}')">Generate Joining Form PDF</button>
          <button class="btn btn-ghost" onclick="closeModal()">Close</button>
        </div>
        <div class="danger-zone">
          <button class="btn btn-danger" onclick="deleteApplication('${emp.employee_id}')">Delete This Application</button>
          <div style="font-size:11.5px;color:var(--text-dim);margin-top:6px;">Permanently removes this applicant, all their answers, and every uploaded document. Can't be undone — use for test/dummy entries.</div>
        </div>
      </div>
    </div>`;
}

async function deleteDocument(docId, employeeId){
  if(!confirm('Delete this document permanently?')) return;
  const res = await apiPost('adminDeleteDocument', {doc_id: docId});
  if(res.ok){ toast('Document deleted'); openApplicant(employeeId); } else toast('Delete failed: '+res.error);
}

async function deleteApplication(employeeId){
  if(!confirm('Permanently delete this application and all its uploaded documents? This cannot be undone.')) return;
  if(!confirm('Are you sure? Type OK in the next confirm to proceed.')) return;
  const res = await apiPost('adminDeleteEmployee', {employee_id: employeeId});
  if(res.ok){
    toast('Application deleted');
    closeModal();
    loadApplicants();
  } else toast('Delete failed: '+res.error);
}

async function downloadZip(employeeId){
  toast('Building ZIP...');
  const res = await apiGet({action:'adminDownloadZip', employee_id: employeeId});
  if(!res.ok){ toast('ZIP failed: '+res.error); return; }
  const link = document.createElement('a');
  link.href = 'data:application/zip;base64,' + res.base64;
  link.download = res.filename;
  link.click();
}

async function generatePdf(employeeId){
  toast('Generating PDF...');
  const res = await apiGet({action:'adminGeneratePdf', employee_id: employeeId});
  if(res.ok){ window.open(res.pdf_url, '_blank'); } else toast('PDF failed: '+res.error);
}
</script>
</body>
</html>
